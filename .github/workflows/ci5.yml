name: artifacts
on: 
  push: 
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: 
          python-version: '3.12'

      - run: pip install --quiet -r app/requirements.txt
      - name: Run unit tests with reports
        run: | 
          cd app
          pytest tests/test_unit.py \ 
          --cov=calc --cov-fail-under=80 \ 
          --cov-report=xml \
          --junitxml=junit.xml

      - name: Uploud test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/junit.xml
            app/coverage.xml
          retention-days: 14

  report: 
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps: 
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with: 
          name: test-reports